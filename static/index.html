<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>代码问答 🍡</title>

<!-- Markdown + 代码高亮（CDN，需联网；离线时回退为纯文本） -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/atom-one-light.min.css" />
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>

<style>
  :root {
    --pink:   #ffd6e7;
    --pink-d: #ff9ec4;
    --mint:   #c9f2e3;
    --mint-d: #6fd6b6;
    --cream:  #fff4d6;
    --lilac:  #e6dcff;
    --lilac-d:#b9a3ff;
    --ink:    #5b5266;
    --ink-2:  #8a7f96;
    --card:   #ffffff;
    --shadow: 0 8px 24px rgba(186, 146, 196, .18);
    --radius: 22px;
    --radius-sm: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(135deg, #fff8fb 0%, #f3f0ff 100%);
    display: flex; height: 100vh; overflow: hidden;
  }
  code, pre { font-family: "JetBrains Mono", "Cascadia Code", Consolas, monospace; }

  /* ---------------- 侧边栏 ---------------- */
  .sidebar {
    width: 270px; flex-shrink: 0; height: 100%;
    background: rgba(255,255,255,.7); backdrop-filter: blur(8px);
    border-right: 2px solid var(--pink);
    display: flex; flex-direction: column; padding: 18px 14px; gap: 14px;
  }
  .logo { font-size: 21px; font-weight: 800; letter-spacing: .5px; padding: 4px 6px; }
  .logo .dot { color: var(--pink-d); }
  .new-btn {
    border: none; cursor: pointer; padding: 12px; border-radius: var(--radius-sm);
    background: linear-gradient(120deg, var(--pink-d), var(--lilac-d));
    color: #fff; font-size: 15px; font-weight: 700; box-shadow: var(--shadow);
    transition: transform .12s ease;
  }
  .new-btn:hover { transform: translateY(-2px) scale(1.02); }
  .hist-title { font-size: 12px; color: var(--ink-2); padding: 4px 8px; letter-spacing: 1px; }
  .hist-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .hist-empty { font-size: 13px; color: var(--ink-2); padding: 8px; text-align: center; }
  .hist-item {
    position: relative; padding: 10px 12px; border-radius: var(--radius-sm);
    background: var(--card); box-shadow: 0 2px 8px rgba(186,146,196,.10);
    cursor: pointer; transition: transform .1s ease, box-shadow .1s ease;
  }
  .hist-item:hover { transform: translateX(3px); box-shadow: var(--shadow); }
  .hist-item.active { outline: 2px solid var(--pink-d); }
  .hist-item .t { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 16px; }
  .hist-item .m { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: var(--mint); color: #2c7a62; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px;
  }
  .hist-item .time { font-size: 11px; color: var(--ink-2); margin-left: auto; flex-shrink: 0; }
  .del {
    position: absolute; top: 8px; right: 8px; border: none; background: transparent;
    cursor: pointer; opacity: 0; font-size: 13px; color: var(--ink-2);
  }
  .hist-item:hover .del { opacity: 1; }

  /* ---------------- 主区域 ---------------- */
  .main { flex: 1; display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .topbar {
    height: 58px; flex-shrink: 0; display: flex; align-items: center; gap: 10px;
    padding: 0 24px; border-bottom: 2px solid var(--pink);
    background: rgba(255,255,255,.6);
  }
  .topbar .tt { font-weight: 700; }
  .feed { flex: 1; overflow-y: auto; padding: 26px 22px; display: flex; flex-direction: column; gap: 16px; }

  /* 空状态：场景卡片 */
  .empty { margin: auto; text-align: center; max-width: 760px; width: 100%; }
  .empty h2 { font-size: 24px; }
  .empty p { color: var(--ink-2); margin-top: 4px; }
  .scenarios { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 14px; margin-top: 24px; }
  .scn {
    text-align: left; cursor: pointer; padding: 16px; border-radius: var(--radius);
    background: var(--card); box-shadow: var(--shadow); border: 2px solid transparent;
    transition: transform .12s ease, border-color .12s ease;
  }
  .scn:hover { transform: translateY(-3px); border-color: var(--pink-d); }
  .scn .ic { font-size: 26px; }
  .scn .n { font-size: 16px; font-weight: 800; margin-top: 6px; }
  .scn .d { font-size: 13px; color: var(--ink-2); margin-top: 4px; line-height: 1.5; }
  .scn .cwd { font-size: 11px; color: var(--lilac-d); margin-top: 6px; word-break: break-all; }

  /* 消息气泡 */
  .msg { display: flex; gap: 10px; max-width: 100%; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to {opacity:1; transform:none;} }
  .msg .av { width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%; display: grid; place-items: center; font-size: 18px; }
  .msg.user { flex-direction: row-reverse; }
  .msg.user .av { background: var(--cream); }
  .msg.bot  .av { background: var(--mint); }
  .bubble { padding: 12px 16px; border-radius: var(--radius); max-width: 78%; line-height: 1.7; box-shadow: 0 2px 10px rgba(186,146,196,.12); overflow-x: auto; }
  .msg.user .bubble { background: var(--cream); border-top-right-radius: 6px; white-space: pre-wrap; word-break: break-word; }
  .msg.bot  .bubble { background: #fff; border-top-left-radius: 6px; }
  .msg.bot.err .bubble { background: #fff0f3; }
  .bubble pre { background: #f6f5fb; padding: 12px; border-radius: var(--radius-sm); overflow-x: auto; }
  .bubble :not(pre) > code { background: #f3eaff; color: #7a4ed1; padding: 1px 6px; border-radius: 6px; font-size: .9em; }
  .bubble p:first-child { margin-top: 0; } .bubble p:last-child { margin-bottom: 0; }
  .meta { font-size: 11px; color: var(--ink-2); margin-top: 6px; }

  /* 思考中动画 */
  .thinking { display: flex; align-items: center; gap: 8px; color: var(--ink-2); font-size: 14px; }
  .dots { display: inline-flex; gap: 5px; }
  .dots i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; animation: bounce 1s infinite ease-in-out; }
  .dots i:nth-child(1){ background: var(--pink-d); }
  .dots i:nth-child(2){ background: var(--mint-d); animation-delay: .15s; }
  .dots i:nth-child(3){ background: var(--lilac-d); animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100%{ transform: scale(.6); opacity:.5;} 40%{ transform: scale(1); opacity:1;} }

  /* 输入区 */
  .composer { flex-shrink: 0; padding: 14px 22px 20px; border-top: 2px solid var(--pink); background: rgba(255,255,255,.6); }
  .composer .row { display: flex; gap: 10px; align-items: flex-end; max-width: 900px; margin: 0 auto; }
  textarea {
    flex: 1; resize: none; border: 2px solid var(--lilac); border-radius: var(--radius);
    padding: 12px 16px; font-size: 15px; font-family: inherit; color: var(--ink);
    outline: none; max-height: 140px; background: #fff; transition: border-color .12s;
  }
  textarea:focus { border-color: var(--pink-d); }
  textarea:disabled { background: #f7f4fb; color: var(--ink-2); }
  .send {
    border: none; cursor: pointer; width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(120deg, var(--mint-d), var(--lilac-d)); color: #fff;
    font-size: 20px; box-shadow: var(--shadow); transition: transform .12s; flex-shrink: 0;
  }
  .send:hover:not(:disabled) { transform: scale(1.08); }
  .send:disabled { opacity: .5; cursor: not-allowed; }
  .hint { text-align: center; font-size: 11px; color: var(--ink-2); margin-top: 8px; }
  .toast {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    background: #fff; color: var(--ink); padding: 10px 18px; border-radius: 999px;
    box-shadow: var(--shadow); border: 2px solid var(--pink-d); font-size: 14px;
    z-index: 99; opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="logo">🍡 代码问答<span class="dot">.</span></div>
    <button class="new-btn" onclick="newChat()">＋ 新对话</button>
    <div class="hist-title">历史会话（本浏览器）</div>
    <div class="hist-list" id="histList"></div>
  </aside>

  <!-- 主区域 -->
  <main class="main">
    <div class="topbar">
      <span id="topScn" style="display:none">
        <span class="tt">当前场景</span> <span class="badge" id="topBadge"></span>
      </span>
      <span id="topEmpty" class="tt" style="color:var(--ink-2)">选择一个场景开始吧 ✨</span>
    </div>

    <div class="feed" id="feed"></div>

    <div class="composer">
      <div class="row">
        <textarea id="input" rows="1" placeholder="问点什么呢～" disabled
                  oninput="autoGrow(this)" onkeydown="onKey(event)"></textarea>
        <button class="send" id="sendBtn" onclick="send()" disabled>✈️</button>
      </div>
      <div class="hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

<script>
  // ============ 常量 ============
  const LS_KEY = "codeqa.sessions";
  // 给场景配个 emoji（按名字关键词猜，猜不到用默认）。
  const SCN_ICONS = [
    [/qa|code|问答|代码/i, "📖"],
    [/trouble|shoot|排查|问题|bug|fix/i, "🔧"],
    [/log|日志/i, "📋"],
    [/db|sql|数据/i, "🗄️"],
  ];
  function scnIcon(name, desc) {
    const s = (name + " " + (desc || ""));
    for (const [re, ic] of SCN_ICONS) if (re.test(s)) return ic;
    return "📁";
  }

  // ============ 状态 ============
  let SCENARIOS = [];       // 来自 /scenarios
  let DEFAULT_SCN = null;
  let current = null;       // { id, scenario }
  let busy = false;

  // ============ 启动 ============
  init();
  async function init() {
    renderHist();
    try {
      const r = await fetch("/scenarios");
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      SCENARIOS = data.scenarios || [];
      DEFAULT_SCN = data.default_scenario || (SCENARIOS[0] && SCENARIOS[0].name);
    } catch (e) {
      toast("场景加载失败：" + e.message + " 🥺");
    }
    newChat();
  }

  // ============ localStorage 历史 ============
  function loadSessions() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
    catch { return []; }
  }
  function saveSessions(list) { localStorage.setItem(LS_KEY, JSON.stringify(list)); }
  function upsertSession(s) {
    const list = loadSessions().filter(x => x.id !== s.id);
    list.unshift(s);
    saveSessions(list);
    renderHist();
  }
  function touchSession(id) {
    const list = loadSessions();
    const s = list.find(x => x.id === id);
    if (s) { s.updatedAt = new Date().toISOString(); saveSessions([s, ...list.filter(x => x.id !== id)]); renderHist(); }
  }
  function removeSession(id) {
    saveSessions(loadSessions().filter(x => x.id !== id));
    if (current && current.id === id) newChat();
    renderHist();
  }

  function renderHist() {
    const el = document.getElementById("histList");
    const list = loadSessions();
    el.innerHTML = "";
    if (!list.length) { el.innerHTML = `<div class="hist-empty">还没有会话哦～<br/>新建一个开始吧 🍬</div>`; return; }
    list.forEach(s => {
      const d = document.createElement("div");
      d.className = "hist-item" + (current && current.id === s.id ? " active" : "");
      d.onclick = () => openSession(s.id);
      d.innerHTML = `
        <div class="t">${escapeHtml(s.title || "未命名会话")}</div>
        <div class="m">
          <span class="badge">${escapeHtml(s.scenario || "")}</span>
          <span class="time">${relTime(s.updatedAt)}</span>
        </div>
        <button class="del" title="删除" data-id="${s.id}">✕</button>`;
      d.querySelector(".del").onclick = (e) => { e.stopPropagation(); removeSession(s.id); };
      el.appendChild(d);
    });
  }

  // ============ 会话视图 ============
  function newChat() {
    current = { id: null, scenario: null };
    document.getElementById("topScn").style.display = "none";
    document.getElementById("topEmpty").style.display = "inline";
    setEnabled(false);
    renderHist();
    renderScenarioPicker();
  }

  function renderScenarioPicker() {
    const feed = document.getElementById("feed");
    if (!SCENARIOS.length) {
      feed.innerHTML = `<div class="empty"><h2>暂时没有可用场景 🥺</h2><p>请检查后端 config.json 的 scenarios 配置。</p></div>`;
      return;
    }
    feed.innerHTML = `
      <div class="empty">
        <h2>嗨～我是代码问答小助手 🍡</h2>
        <p>先选一个场景，我就开始帮你读代码、查问题啦！</p>
        <div class="scenarios">
          ${SCENARIOS.map(s => `
            <div class="scn" data-name="${escapeHtml(s.name)}">
              <div class="ic">${scnIcon(s.name, s.description)}</div>
              <div class="n">${escapeHtml(s.name)}</div>
              <div class="d">${escapeHtml(s.description || "")}</div>
              ${s.cwd ? `<div class="cwd">📂 ${escapeHtml(s.cwd)}</div>` : ""}
            </div>`).join("")}
        </div>
      </div>`;
    feed.querySelectorAll(".scn").forEach(el =>
      el.onclick = () => pickScenario(el.dataset.name));
  }

  function pickScenario(name) {
    current = { id: null, scenario: name };
    showScenarioBadge(name);
    document.getElementById("feed").innerHTML = "";
    setEnabled(true);
    document.getElementById("input").focus();
  }

  function showScenarioBadge(name) {
    document.getElementById("topEmpty").style.display = "none";
    document.getElementById("topScn").style.display = "inline";
    document.getElementById("topBadge").textContent = name;
  }

  async function openSession(id) {
    if (busy) { toast("等当前回答结束再切换哦～"); return; }
    setEnabled(false);
    try {
      const r = await fetch(`/conversations/${id}/messages`);
      if (r.status === 404) {
        toast("这个会话后端已经没有啦，帮你从列表移除～");
        removeSession(id);
        return;
      }
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      const scn = (data.conversation && data.conversation.scenario) || DEFAULT_SCN;
      current = { id, scenario: scn };
      showScenarioBadge(scn);
      renderHist();
      const feed = document.getElementById("feed");
      feed.innerHTML = "";
      (data.messages || []).forEach(m => addBubble(m.role === "user" ? "user" : "bot", m.content, true));
      setEnabled(true);
      scrollBottom();
    } catch (e) {
      toast("加载会话失败：" + e.message + " 🥺");
      setEnabled(true);
    }
  }

  // ============ 发送 / 流式 ============
  async function send() {
    const input = document.getElementById("input");
    const q = input.value.trim();
    if (!q || busy || !current.scenario) return;

    addBubble("user", q, false);
    input.value = ""; autoGrow(input);
    busy = true; setEnabled(false);

    const think = addThinking();
    let secs = 0;
    const timer = setInterval(() => { secs++; const e = think.querySelector(".secs"); if (e) e.textContent = secs + "s"; }, 1000);

    let bubble = null, contentEl = null, answer = "", started = false;
    const startBubble = () => { clearInterval(timer); think.remove(); const b = addBubble("bot", "", false); bubble = b.bubble; contentEl = b.contentEl; started = true; };

    try {
      const resp = await fetch("/ask_stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q, scenario: current.scenario, conversation_id: current.id }),
      });

      // 进入流之前的错误（404/400/500）以 JSON 返回。
      if (!resp.ok) {
        clearInterval(timer); think.remove();
        let msg = "HTTP " + resp.status;
        try { const j = await resp.json(); if (j.error) msg = j.error; } catch {}
        showError(msg);
        return;
      }

      await parseSSE(resp, (event, data) => {
        if (event === "token") {
          if (!started) startBubble();
          answer += (data.text || "");
          renderMarkdown(contentEl, answer, false);
          scrollBottom();
        } else if (event === "done") {
          if (!started) startBubble();
          answer = data.answer || answer;
          renderMarkdown(contentEl, answer, true);
          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `🍬 ${data.num_turns ?? 0} 轮 · $${(data.cost_usd ?? 0).toFixed(4)}`;
          bubble.appendChild(meta);
          onAnswered(data.conversation_id, q);
        } else if (event === "error") {
          clearInterval(timer); if (!started) think.remove();
          showError(data.error || "未知错误");
        }
      });
    } catch (e) {
      clearInterval(timer); think.remove();
      showError("网络出问题了：" + e.message);
    } finally {
      clearInterval(timer);
      busy = false; setEnabled(true);
      document.getElementById("input").focus();
      scrollBottom();
    }
  }

  // 读取 fetch 响应流并解析 SSE（event: / data: 行，块间用空行分隔）。
  async function parseSSE(resp, onEvent) {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let buf = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
        let ev = "message", dataStr = "";
        chunk.split("\n").forEach(line => {
          if (line.startsWith("event:")) ev = line.slice(6).trim();
          else if (line.startsWith("data:")) dataStr += line.slice(5).trim();
        });
        if (!dataStr) continue;
        let data; try { data = JSON.parse(dataStr); } catch { data = { text: dataStr }; }
        onEvent(ev, data);
      }
    }
  }

  function onAnswered(convId, question) {
    if (!convId) return;
    if (!current.id) {
      // 新会话:记到 localStorage,标题取首问。
      current.id = convId;
      const now = new Date().toISOString();
      upsertSession({ id: convId, scenario: current.scenario, title: question.slice(0, 20),
                      createdAt: now, updatedAt: now });
    } else {
      touchSession(current.id);
    }
  }

  // ============ DOM 辅助 ============
  function addBubble(role, text, withMd) {
    const feed = document.getElementById("feed");
    const msg = document.createElement("div");
    msg.className = "msg " + (role === "user" ? "user" : "bot");
    const av = role === "user" ? "🧑" : "🍡";
    msg.innerHTML = `<div class="av">${av}</div><div class="bubble"><div class="content"></div></div>`;
    const contentEl = msg.querySelector(".content");
    if (role === "user") contentEl.textContent = text;
    else if (withMd) renderMarkdown(contentEl, text, true);
    feed.appendChild(msg);
    scrollBottom();
    return { bubble: msg.querySelector(".bubble"), contentEl };
  }

  function addThinking() {
    const feed = document.getElementById("feed");
    const msg = document.createElement("div");
    msg.className = "msg bot";
    msg.innerHTML = `<div class="av">🍡</div>
      <div class="bubble"><div class="thinking">
        <span class="dots"><i></i><i></i><i></i></span>
        正在认真思考<span class="secs" style="margin-left:4px">0s</span>
      </div></div>`;
    feed.appendChild(msg); scrollBottom();
    return msg;
  }

  function showError(msg) {
    const { bubble } = addBubble("bot", "", false);
    bubble.parentElement.classList.add("err");
    bubble.querySelector(".content").innerHTML =
      `呜…出了点小状况，再试一次好吗？🥺<div class="meta">${escapeHtml(msg)}</div>`;
    scrollBottom();
  }

  function renderMarkdown(el, text, highlight) {
    if (window.marked) {
      el.innerHTML = marked.parse(text);
      if (highlight && window.hljs) el.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b));
    } else {
      el.textContent = text; // 离线回退
    }
  }

  function setEnabled(on) {
    document.getElementById("input").disabled = !on;
    document.getElementById("sendBtn").disabled = !on;
  }
  function scrollBottom() { const f = document.getElementById("feed"); f.scrollTop = f.scrollHeight; }
  function autoGrow(t) { t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 140) + "px"; }
  function onKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }
  function escapeHtml(s){ const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }

  let toastTimer = null;
  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
  }

  function relTime(iso) {
    if (!iso) return "";
    const d = new Date(iso), now = new Date(), diff = (now - d) / 1000;
    if (diff < 60) return "刚刚";
    if (diff < 3600) return Math.floor(diff / 60) + "分钟前";
    if (diff < 86400 && d.getDate() === now.getDate()) return d.toTimeString().slice(0, 5);
    if (diff < 172800) return "昨天";
    return `${d.getMonth() + 1}/${d.getDate()}`;
  }
</script>
</body>
</html>
