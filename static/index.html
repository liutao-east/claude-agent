<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>后端问答AI助手</title>

<!-- Markdown + 代码高亮 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/github.min.css" />
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>

<link rel="stylesheet" href="/styles/app.css" />
</head>
<body>

<!-- ═══ 侧边栏 ═══ -->
<aside class="sidebar" aria-label="侧边栏">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-ico" aria-hidden="true">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <span class="logo-name">后端问答AI助手</span>
  </div>

  <!-- 新对话 -->
  <button class="new-btn" id="newBtn" aria-label="新建对话">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    新对话
  </button>

  <div class="sep"></div>

  <!-- 历史 -->
  <div class="hist-wrap">
    <div class="hist-hd">历史记录</div>
    <div class="hist-list" id="histList" role="list" aria-label="历史会话列表"></div>
  </div>
</aside>

<!-- ═══ 主区域 ═══ -->
<main class="main">

  <!-- 顶栏 -->
  <header class="topbar">
    <button class="collapse-btn" id="collapseBtn" aria-label="折叠侧栏" title="折叠/展开侧栏">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-ico" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <span id="topEmpty" class="topbar-hint">选择一个场景，开始对话</span>
    <span id="topScn" style="display:none" aria-live="polite">
      <span class="topbar-label">场景&nbsp;</span>
      <span class="topbar-badge" id="topBadge"></span>
    </span>
  </header>

  <!-- 消息流 -->
  <div class="feed" id="feed" role="log" aria-label="对话内容" aria-live="polite"></div>

  <!-- 输入区 -->
  <div class="composer">
    <div class="composer-inner">
      <div class="composer-box">
        <textarea
          id="input" rows="1"
          placeholder="有什么想问的？"
          disabled
          aria-label="输入问题"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled aria-label="发送消息">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
