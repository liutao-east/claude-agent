<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>后端问答AI助手</title>

<!-- Markdown + 代码高亮 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/github.min.css" />
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>

<link rel="stylesheet" href="/styles/app.css" />
</head>
<body>

<!-- ═══ 侧边栏 ═══ -->
<aside class="sidebar" aria-label="侧边栏">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-ico" aria-hidden="true">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <span class="logo-name">后端问答AI助手</span>
  </div>

  <!-- 新对话 -->
  <button class="new-btn" onclick="newChat()" aria-label="新建对话">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    新对话
  </button>

  <div class="sep"></div>

  <!-- 历史 -->
  <div class="hist-wrap">
    <div class="hist-hd">历史记录</div>
    <div class="hist-list" id="histList" role="list" aria-label="历史会话列表"></div>
  </div>
</aside>

<!-- ═══ 主区域 ═══ -->
<main class="main">

  <!-- 顶栏 -->
  <header class="topbar">
    <div class="topbar-ico" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <span id="topEmpty" class="topbar-hint">选择一个场景，开始对话</span>
    <span id="topScn" style="display:none" aria-live="polite">
      <span class="topbar-label">场景&nbsp;</span>
      <span class="topbar-badge" id="topBadge"></span>
    </span>
  </header>

  <!-- 消息流 -->
  <div class="feed" id="feed" role="log" aria-label="对话内容" aria-live="polite"></div>

  <!-- 输入区 -->
  <div class="composer">
    <div class="composer-inner">
      <div class="composer-box">
        <textarea
          id="input" rows="1"
          placeholder="有什么想问的？"
          disabled
          aria-label="输入问题"
          oninput="autoGrow(this)"
          onkeydown="onKey(event)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()" disabled aria-label="发送消息">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ═══════════════════════
   常量 & 状态
═══════════════════════ */
const LS_KEY = "codeqa.sessions";

// SVG 图标映射
const SCN_ICONS = {
  code: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  tool: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
  log:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  db:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
  folder:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
};

// 用户 & AI 头像 SVG
const USER_AV = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
const BOT_AV  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`;

function scnIcon(name, desc) {
  const s = (name + " " + (desc || "")).toLowerCase();
  if (/qa|code|问答|代码/.test(s))              return SCN_ICONS.code;
  if (/trouble|shoot|排查|问题|bug|fix/.test(s)) return SCN_ICONS.tool;
  if (/log|日志/.test(s))                       return SCN_ICONS.log;
  if (/db|sql|数据/.test(s))                    return SCN_ICONS.db;
  return SCN_ICONS.folder;
}

let SCENARIOS   = [];
let DEFAULT_SCN = null;
let current     = null;   // { id, scenario }
let busy        = false;

/* ═══════════════════════
   启动
═══════════════════════ */
init();
async function init() {
  renderHist();
  try {
    const r = await fetch("/scenarios");
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    SCENARIOS   = data.scenarios || [];
    DEFAULT_SCN = data.default_scenario || (SCENARIOS[0] && SCENARIOS[0].name);
  } catch (e) {
    toast("场景加载失败：" + e.message);
  }
  restoreFromHash();
}

/* ═══════════════════════
   路由：让刷新 / 直达保持当前视图
   #s/<场景>  仅选了场景、尚未产生会话
   #c/<会话id> 已有会话
═══════════════════════ */
function setRoute(hash) {
  // replaceState 更新地址栏但不新增历史、不触发事件，避免重入
  history.replaceState(null, "", hash ? "#" + hash : location.pathname + location.search);
}

function restoreFromHash() {
  const h = location.hash.replace(/^#\/?/, "");
  if (h.startsWith("c/")) {
    const id = h.slice(2);
    if (loadSessions().some(x => x.id === id)) { openSession(id); return; }
  } else if (h.startsWith("s/")) {
    const name = decodeURIComponent(h.slice(2));
    if (SCENARIOS.some(s => s.name === name)) { pickScenario(name); return; }
  }
  newChat();
}

/* ═══════════════════════
   localStorage 历史
═══════════════════════ */
function loadSessions() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; }
}
function saveSessions(list) { localStorage.setItem(LS_KEY, JSON.stringify(list)); }

function upsertSession(s) {
  const list = loadSessions().filter(x => x.id !== s.id);
  list.unshift(s);
  saveSessions(list);
  renderHist();
}
function touchSession(id) {
  const list = loadSessions();
  const s = list.find(x => x.id === id);
  if (s) { s.updatedAt = new Date().toISOString(); saveSessions([s, ...list.filter(x => x.id !== id)]); renderHist(); }
}
function removeSession(id) {
  saveSessions(loadSessions().filter(x => x.id !== id));
  if (current && current.id === id) newChat();
  renderHist();
}

function renderHist() {
  const el   = document.getElementById("histList");
  const list = loadSessions();
  el.innerHTML = "";
  if (!list.length) {
    el.innerHTML = `<div class="hist-empty">暂无历史记录<br/>新建一个对话开始吧</div>`;
    return;
  }
  list.forEach(s => {
    const item = document.createElement("div");
    item.className = "hist-item" + (current && current.id === s.id ? " active" : "");
    item.setAttribute("role", "listitem");
    item.setAttribute("tabindex", "0");
    item.setAttribute("aria-label", s.title || "未命名会话");
    item.onclick = () => openSession(s.id);
    item.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openSession(s.id); } };
    item.innerHTML = `
      <div class="hi-title">${escHtml(s.title || "未命名会话")}</div>
      <div class="hi-meta">
        <span class="hi-badge">${escHtml(s.scenario || "")}</span>
        <span class="hi-time">${relTime(s.updatedAt)}</span>
      </div>
      <button class="hi-del" title="删除" aria-label="删除此会话">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>`;
    item.querySelector(".hi-del").onclick = e => { e.stopPropagation(); removeSession(s.id); };
    el.appendChild(item);
  });
}

/* ═══════════════════════
   会话视图
═══════════════════════ */
function newChat() {
  current = { id: null, scenario: null };
  setRoute("");
  document.getElementById("topScn").style.display  = "none";
  document.getElementById("topEmpty").style.display = "";
  setEnabled(false);
  renderHist();
  renderScenarioPicker();
}

function renderScenarioPicker() {
  const feed = document.getElementById("feed");
  if (!SCENARIOS.length) {
    feed.innerHTML = `
      <div class="welcome">
        <div class="welcome-ico" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h2>暂无可用场景</h2>
        <p>请检查后端 config.json 中的 scenarios 配置。</p>
      </div>`;
    return;
  }
  feed.innerHTML = `
    <div class="welcome">
      <div class="welcome-ico" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <h2>代码问答助手</h2>
      <p>选择一个场景，我来帮你读代码、查问题。</p>
      <div class="scn-grid">
        ${SCENARIOS.map(s => `
          <div class="scn-card" data-name="${escHtml(s.name)}" tabindex="0" role="button" aria-label="选择场景：${escHtml(s.name)}">
            <div class="scn-icon" aria-hidden="true">${scnIcon(s.name, s.description)}</div>
            <div class="scn-name">${escHtml(s.name)}</div>
            <div class="scn-desc">${escHtml(s.description || "")}</div>
<!--            ${s.cwd ? `<div class="scn-cwd">${escHtml(s.cwd)}</div>` : ""}-->
          </div>`).join("")}
      </div>
    </div>`;
  feed.querySelectorAll(".scn-card").forEach(el => {
    el.onclick   = () => pickScenario(el.dataset.name);
    el.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pickScenario(el.dataset.name); } };
  });
}

function pickScenario(name) {
  current = { id: null, scenario: name };
  setRoute("s/" + encodeURIComponent(name));
  showBadge(name);
  document.getElementById("feed").innerHTML = "";
  // 选中场景后,先以一条 AI 气泡显示该场景的引导语(介绍用途+用法)。
  // 仅前端渲染,不发往后端、不入库,故重开历史会话时不会重复出现。
  const scn = SCENARIOS.find(s => s.name === name);
  if (scn && scn.guide) addBubble("bot", scn.guide, true);
  setEnabled(true);
  document.getElementById("input").focus();
}

function showBadge(name) {
  document.getElementById("topEmpty").style.display = "none";
  document.getElementById("topScn").style.display   = "";
  document.getElementById("topBadge").textContent   = name;
}

async function openSession(id) {
  if (busy) { toast("请等当前回答完成再切换会话"); return; }
  setEnabled(false);
  try {
    const r = await fetch(`/conversations/${id}/messages`);
    if (r.status === 404) { toast("该会话在后端已不存在，已从列表移除"); removeSession(id); return; }
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    const scn  = (data.conversation && data.conversation.scenario) || DEFAULT_SCN;
    current = { id, scenario: scn };
    setRoute("c/" + id);
    showBadge(scn);
    renderHist();
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    (data.messages || []).forEach(m => addBubble(m.role === "user" ? "user" : "bot", m.content, true));
    setEnabled(true);
    scrollBottom();
  } catch (e) {
    toast("加载会话失败：" + e.message);
    setEnabled(true);
  }
}

/* ═══════════════════════
   发送 & SSE 流
═══════════════════════ */
async function send() {
  const input = document.getElementById("input");
  const q = input.value.trim();
  if (!q || busy || !current.scenario) return;

  addBubble("user", q, false);
  input.value = ""; autoGrow(input);
  busy = true; setEnabled(false);

  const thinkEl = addThinking();
  let secs = 0;
  const timer = setInterval(() => {
    secs++;
    const el = thinkEl.querySelector(".thinking-secs");
    if (el) el.textContent = secs + "s";
  }, 1000);

  let bubble = null, contentEl = null, answer = "", started = false;

  const startBubble = () => {
    clearInterval(timer);
    thinkEl.remove();
    const b = addBubble("bot", "", false);
    bubble = b.bubble; contentEl = b.contentEl;
    started = true;
  };

  try {
    const resp = await fetch("/ask_stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, scenario: current.scenario, conversation_id: current.id }),
    });

    if (!resp.ok) {
      clearInterval(timer); thinkEl.remove();
      let msg = "HTTP " + resp.status;
      try { const j = await resp.json(); if (j.error) msg = j.error; } catch {}
      showError(msg); return;
    }

    await parseSSE(resp, (event, data) => {
      if (event === "token") {
        if (!started) startBubble();
        answer += (data.text || "");
        renderMd(contentEl, answer, false);
        scrollBottom();
      } else if (event === "done") {
        if (!started) startBubble();
        answer = data.answer || answer;
        renderMd(contentEl, answer, true);
        const meta = document.createElement("div");
        meta.className = "msg-meta";
        meta.innerHTML = `<span>${data.num_turns ?? 0} 轮对话</span><span class="meta-dot"></span><span>$${(data.cost_usd ?? 0).toFixed(4)}</span>`;
        bubble.appendChild(meta);
        onAnswered(data.conversation_id, q);
      } else if (event === "error") {
        clearInterval(timer);
        if (!started) thinkEl.remove();
        showError(data.error || "未知错误");
      }
    });
  } catch (e) {
    clearInterval(timer); thinkEl.remove();
    showError("网络错误：" + e.message);
  } finally {
    clearInterval(timer);
    busy = false; setEnabled(true);
    document.getElementById("input").focus();
    scrollBottom();
  }
}

async function parseSSE(resp, onEvent) {
  const reader  = resp.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let buf = "";
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf("\n\n")) !== -1) {
      const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
      let ev = "message", dataStr = "";
      chunk.split("\n").forEach(line => {
        if (line.startsWith("event:"))      ev      = line.slice(6).trim();
        else if (line.startsWith("data:"))  dataStr += line.slice(5).trim();
      });
      if (!dataStr) continue;
      let d; try { d = JSON.parse(dataStr); } catch { d = { text: dataStr }; }
      onEvent(ev, d);
    }
  }
}

function onAnswered(convId, question) {
  if (!convId) return;
  if (!current.id) {
    current.id = convId;
    setRoute("c/" + convId);
    const now = new Date().toISOString();
    upsertSession({ id: convId, scenario: current.scenario, title: question.slice(0, 22), createdAt: now, updatedAt: now });
  } else {
    touchSession(current.id);
  }
}

/* ═══════════════════════
   DOM 辅助
═══════════════════════ */
function addBubble(role, text, withMd) {
  const feed = document.getElementById("feed");
  const msg  = document.createElement("div");
  msg.className = "msg " + (role === "user" ? "user" : "bot");
  msg.innerHTML = `<div class="av" aria-hidden="true">${role === "user" ? USER_AV : BOT_AV}</div><div class="bubble"><div class="content"></div></div>`;
  const contentEl = msg.querySelector(".content");
  if (role === "user")    contentEl.textContent = text;
  else if (withMd)        renderMd(contentEl, text, true);
  feed.appendChild(msg);
  scrollBottom();
  return { bubble: msg.querySelector(".bubble"), contentEl };
}

function addThinking() {
  const feed = document.getElementById("feed");
  const msg  = document.createElement("div");
  msg.className = "msg bot";
  msg.setAttribute("aria-live", "polite");
  msg.innerHTML = `
    <div class="av" aria-hidden="true">${BOT_AV}</div>
    <div class="bubble thinking-bubble">
      <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
      <span class="thinking-text">正在思考</span>
      <span class="thinking-secs">0s</span>
    </div>`;
  feed.appendChild(msg); scrollBottom();
  return msg;
}

function showError(msg) {
  const { bubble } = addBubble("bot", "", false);
  bubble.parentElement.classList.add("err");
  bubble.querySelector(".content").innerHTML =
    `出了点状况，请稍后再试。<div class="msg-meta">${escHtml(msg)}</div>`;
  scrollBottom();
}

const COPY_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function addCopyButtons(el) {
  el.querySelectorAll("pre").forEach(pre => {
    if (pre.querySelector(".copy-btn")) return;
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.setAttribute("aria-label", "复制代码");
    btn.innerHTML = COPY_ICON;
    btn.addEventListener("click", () => {
      const code = pre.querySelector("code");
      const text = code ? code.innerText : pre.innerText;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add("copied");
        btn.innerHTML = CHECK_ICON;
        setTimeout(() => { btn.classList.remove("copied"); btn.innerHTML = COPY_ICON; }, 2000);
      }).catch(() => {
        const range = document.createRange();
        range.selectNodeContents(code || pre);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
      });
    });
    pre.appendChild(btn);
  });
}

function renderMd(el, text, hl) {
  if (window.marked) {
    el.innerHTML = marked.parse(text);
    if (hl && window.hljs) el.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b));
    if (hl) addCopyButtons(el);
  } else {
    el.textContent = text;
  }
}

function setEnabled(on) {
  const inp = document.getElementById("input");
  const btn = document.getElementById("sendBtn");
  inp.disabled = !on;
  btn.disabled = !on;
  inp.setAttribute("aria-disabled", String(!on));
}

function scrollBottom() { const f = document.getElementById("feed"); f.scrollTop = f.scrollHeight; }
function autoGrow(t)    { t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 140) + "px"; }
function onKey(e)       { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }
function escHtml(s)     { const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
}

function relTime(iso) {
  if (!iso) return "";
  const d = new Date(iso), now = new Date(), diff = (now - d) / 1000;
  if (diff < 60)    return "刚刚";
  if (diff < 3600)  return Math.floor(diff / 60) + " 分钟前";
  if (diff < 86400 && d.getDate() === now.getDate()) return d.toTimeString().slice(0, 5);
  if (diff < 172800) return "昨天";
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
</script>
