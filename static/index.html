<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>后端问答AI助手</title>

<!-- Markdown + 代码高亮 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/github.min.css" />
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>

<style>
  :root {
    --primary:      #4F81F8;
    --primary-d:    #2563EB;
    --primary-l:    #EEF3FF;
    --primary-ring: rgba(79, 129, 248, .22);
    --ai:           #059669;
    --ai-l:         #ECFDF5;
    --danger:       #EF4444;
    --danger-l:     #FEF2F2;
    --bg:           #F5F7FB;
    --surface:      #FFFFFF;
    --surface-2:    #F8FAFC;
    --border:       #E4E9F0;
    --border-2:     #CFD8E8;
    --text:         #1A202C;
    --text-2:       #64748B;
    --text-3:       #A0AEC0;
    --sh-sm:        0 1px 2px rgba(0,0,0,.06);
    --sh:           0 1px 4px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --sh-md:        0 4px 14px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --r:            14px;
    --r-sm:         10px;
    --r-xs:         7px;
    --sidebar-w:    260px;
    --topbar-h:     54px;
    --ease:         cubic-bezier(.4, 0, .2, 1);
    --t:            150ms;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: "PingFang SC", "Microsoft YaHei", Inter, system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  code, pre {
    font-family: "JetBrains Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
  }

  /* ── 滚动条 ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

  /* ═══════════════════════════════
     侧边栏
  ═══════════════════════════════ */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    height: 100%;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 10px;
    gap: 10px;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 6px 8px;
    border-radius: var(--r-sm);
    flex-shrink: 0;
  }
  .logo-ico {
    width: 30px; height: 30px;
    border-radius: 9px;
    background: var(--primary-l);
    display: flex; align-items: center; justify-content: center;
    color: var(--primary);
    flex-shrink: 0;
  }
  .logo-name { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
  .logo-dot  { color: var(--primary); }

  /* 新建按钮 */
  .new-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    border: none; cursor: pointer;
    padding: 10px 12px;
    border-radius: var(--r-sm);
    background: var(--primary);
    color: #fff;
    font-size: 13px; font-weight: 600; font-family: inherit;
    box-shadow: 0 2px 8px rgba(79,129,248,.35);
    transition: background var(--t) var(--ease), transform var(--t) var(--ease), box-shadow var(--t) var(--ease);
    flex-shrink: 0;
  }
  .new-btn:hover  { background: var(--primary-d); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,129,248,.4); }
  .new-btn:active { transform: translateY(0); box-shadow: var(--sh); }
  .new-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

  /* 分隔线 */
  .sep { height: 1px; background: var(--border); margin: 2px 4px; flex-shrink: 0; }

  /* 历史区域 */
  .hist-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
  .hist-hd {
    font-size: 11px; font-weight: 600;
    color: var(--text-3); letter-spacing: .06em; text-transform: uppercase;
    padding: 0 8px;
  }
  .hist-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .hist-empty {
    font-size: 13px; color: var(--text-3);
    padding: 20px 8px; text-align: center; line-height: 1.7;
  }
  .hist-item {
    position: relative; padding: 9px 11px;
    border-radius: var(--r-sm); cursor: pointer;
    border: 1px solid transparent;
    transition: background var(--t) var(--ease), border-color var(--t) var(--ease);
  }
  .hist-item:hover { background: var(--surface-2); }
  .hist-item.active { background: var(--primary-l); border-color: rgba(79,129,248,.18); }
  .hist-item:hover .hi-del { opacity: 1; }
  .hi-title {
    font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding-right: 20px; color: var(--text);
  }
  .hist-item.active .hi-title { color: var(--primary-d); }
  .hi-meta { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
  .hi-badge {
    font-size: 10px; font-weight: 600;
    padding: 1px 7px; border-radius: 99px;
    background: var(--primary-l); color: var(--primary-d);
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .hist-item.active .hi-badge { background: rgba(79,129,248,.15); }
  .hi-time { font-size: 11px; color: var(--text-3); margin-left: auto; flex-shrink: 0; }
  .hi-del {
    position: absolute; top: 8px; right: 8px;
    border: none; background: transparent; cursor: pointer;
    color: var(--text-3); padding: 3px; border-radius: 5px;
    opacity: 0; display: flex;
    transition: color var(--t), background var(--t), opacity var(--t);
    line-height: 0;
  }
  .hi-del:hover { color: var(--danger); background: var(--danger-l); }
  .hi-del:focus-visible { opacity: 1; outline: 2px solid var(--danger); }

  /* ═══════════════════════════════
     主区域
  ═══════════════════════════════ */
  .main { flex: 1; display: flex; flex-direction: column; height: 100%; min-width: 0; }

  /* 顶栏 */
  .topbar {
    height: var(--topbar-h); flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(14px);
  }
  .topbar-ico { color: var(--text-3); flex-shrink: 0; display: flex; }
  .topbar-hint { font-size: 13px; color: var(--text-3); }
  .topbar-label { font-size: 12px; color: var(--text-2); }
  .topbar-badge {
    font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 99px;
    background: var(--ai-l); color: var(--ai);
  }

  /* 消息区 */
  .feed { flex: 1; overflow-y: auto; padding: 24px 22px; display: flex; flex-direction: column; gap: 18px; }

  /* ── 欢迎 / 场景选择 ── */
  .welcome {
    margin: auto; text-align: center;
    max-width: 620px; width: 100%; padding: 16px 0;
  }
  .welcome-ico {
    width: 52px; height: 52px; border-radius: 16px;
    background: var(--primary-l); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .welcome h2 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
  .welcome p  { font-size: 14px; color: var(--text-2); margin-top: 6px; }

  .scn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(195px,1fr)); gap: 10px; margin-top: 22px; }
  .scn-card {
    text-align: left; cursor: pointer;
    padding: 16px; border-radius: var(--r);
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: var(--sh); position: relative; overflow: hidden;
    transition: transform var(--t) var(--ease), box-shadow var(--t) var(--ease), border-color var(--t) var(--ease);
  }
  .scn-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(79,129,248,.06) 0%, transparent 60%);
    opacity: 0; transition: opacity var(--t);
  }
  .scn-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md); border-color: var(--border-2); }
  .scn-card:hover::after { opacity: 1; }
  .scn-card:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .scn-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--primary-l); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  .scn-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .scn-desc { font-size: 12px; color: var(--text-2); margin-top: 4px; line-height: 1.55; }
  .scn-cwd  { font-size: 11px; color: var(--primary); margin-top: 8px; word-break: break-all; font-family: monospace; opacity: .75; }

  /* ── 消息气泡 ── */
  .msg { display: flex; gap: 10px; max-width: 100%; animation: msgIn .22s var(--ease) both; }
  @keyframes msgIn { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:none; } }

  .av {
    width: 30px; height: 30px; border-radius: 9px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .msg.user .av { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); align-self: flex-end; }
  .msg.bot  .av { background: var(--ai-l); color: var(--ai); align-self: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .bubble {
    padding: 11px 15px; border-radius: var(--r);
    max-width: 76%; box-shadow: var(--sh-sm);
    font-size: 14px; line-height: 1.7; overflow-x: auto;
  }
  .msg.user .bubble {
    background: var(--primary); color: #fff;
    border-bottom-right-radius: 4px;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.bot .bubble {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    max-width: 90%;
  }
  .msg.bot.err .bubble { background: var(--danger-l); border-color: #FECACA; }

  /* Markdown 样式 */
  .bubble h1,.bubble h2,.bubble h3,.bubble h4 { font-weight: 700; margin: 14px 0 6px; line-height: 1.35; }
  .bubble h1 { font-size: 18px; } .bubble h2 { font-size: 16px; } .bubble h3 { font-size: 14px; }
  .bubble p { margin: 7px 0; }
  .bubble p:first-child { margin-top: 0; } .bubble p:last-child { margin-bottom: 0; }
  .bubble ul,.bubble ol { padding-left: 20px; margin: 7px 0; }
  .bubble li { margin: 3px 0; }
  .bubble a { color: var(--primary); text-decoration: none; }
  .bubble a:hover { text-decoration: underline; }
  .bubble blockquote { border-left: 3px solid var(--border-2); padding-left: 12px; color: var(--text-2); margin: 10px 0; }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
  .bubble th,.bubble td { border: 1px solid var(--border); padding: 6px 10px; }
  .bubble th { background: var(--surface-2); font-weight: 600; }
  .bubble pre {
    position: relative;
    background: #F8FAFC; border: 1px solid var(--border);
    border-radius: var(--r-xs); padding: 12px 14px;
    overflow-x: auto; margin: 10px 0;
    font-size: 13px; line-height: 1.55;
  }
  .msg.user .bubble pre { background: rgba(0,0,0,.15); border-color: rgba(255,255,255,.15); }
  .copy-btn {
    position: absolute; top: 7px; right: 7px;
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    background: var(--surface, #fff); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer;
    opacity: 0; transition: opacity .15s, background .15s;
    color: var(--text-3, #888); padding: 0;
  }
  .bubble pre:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: var(--surface-2, #f3f4f6); color: var(--text, #222); }
  .copy-btn.copied { color: #16a34a; border-color: #16a34a; }
  .msg.user .bubble pre .copy-btn { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.7); }
  .msg.user .bubble pre .copy-btn:hover { background: rgba(255,255,255,.25); color: #fff; }
  .msg.user .bubble pre .copy-btn.copied { color: #4ade80; border-color: #4ade80; }
  .bubble :not(pre) > code {
    background: rgba(79,129,248,.09); color: var(--primary-d);
    padding: 1px 5px; border-radius: 4px; font-size: .88em;
  }
  .msg.user .bubble :not(pre) > code { background: rgba(255,255,255,.2); color: #fff; }

  .msg-meta { font-size: 11px; color: var(--text-3); margin-top: 6px; display: flex; align-items: center; gap: 5px; }
  .msg.user .msg-meta { justify-content: flex-end; }
  .meta-dot { width: 3px; height: 3px; border-radius: 99px; background: currentColor; }

  /* 思考动画 */
  .thinking-bubble {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 15px;
  }
  .dots { display: flex; gap: 5px; }
  .dots i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--primary); display: inline-block;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .dots i:nth-child(2) { animation-delay: .2s; }
  .dots i:nth-child(3) { animation-delay: .4s; }
  @keyframes dotPulse { 0%,100%{ opacity:.2; transform:scale(.65); } 50%{ opacity:.9; transform:scale(1); } }
  .thinking-text { font-size: 13px; color: var(--text-3); }
  .thinking-secs { font-size: 11px; color: var(--text-3); min-width: 26px; }

  /* ── 输入区 ── */
  .composer {
    flex-shrink: 0;
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(14px);
  }
  .composer-inner { max-width: 820px; margin: 0 auto; }
  .composer-box {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--r); padding: 9px 12px;
    transition: border-color var(--t), box-shadow var(--t);
  }
  .composer-box:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-ring); }
  textarea {
    flex: 1; resize: none; border: none; outline: none;
    font-size: 14px; font-family: inherit; color: var(--text);
    line-height: 1.6; max-height: 140px; background: transparent;
  }
  textarea::placeholder { color: var(--text-3); }
  textarea:disabled { color: var(--text-3); cursor: not-allowed; }
  .send-btn {
    border: none; cursor: pointer;
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--primary); color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background var(--t) var(--ease), transform var(--t) var(--ease);
  }
  .send-btn:hover:not(:disabled)  { background: var(--primary-d); transform: scale(1.06); }
  .send-btn:active:not(:disabled) { transform: scale(.95); }
  .send-btn:disabled { opacity: .38; cursor: not-allowed; }
  .send-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .hint { text-align: center; font-size: 11px; color: var(--text-3); margin-top: 8px; }

  /* ── Toast ── */
  .toast {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--text); color: #fff;
    padding: 9px 16px; border-radius: 99px;
    font-size: 13px; font-weight: 500;
    z-index: 200; pointer-events: none;
    opacity: 0;
    transition: opacity .2s var(--ease), transform .2s var(--ease);
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══ 侧边栏 ═══ -->
<aside class="sidebar" aria-label="侧边栏">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-ico" aria-hidden="true">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <span class="logo-name">后端问答AI助手</span>
  </div>

  <!-- 新对话 -->
  <button class="new-btn" onclick="newChat()" aria-label="新建对话">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    新对话
  </button>

  <div class="sep"></div>

  <!-- 历史 -->
  <div class="hist-wrap">
    <div class="hist-hd">历史记录</div>
    <div class="hist-list" id="histList" role="list" aria-label="历史会话列表"></div>
  </div>
</aside>

<!-- ═══ 主区域 ═══ -->
<main class="main">

  <!-- 顶栏 -->
  <header class="topbar">
    <div class="topbar-ico" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <span id="topEmpty" class="topbar-hint">选择一个场景，开始对话</span>
    <span id="topScn" style="display:none" aria-live="polite">
      <span class="topbar-label">场景&nbsp;</span>
      <span class="topbar-badge" id="topBadge"></span>
    </span>
  </header>

  <!-- 消息流 -->
  <div class="feed" id="feed" role="log" aria-label="对话内容" aria-live="polite"></div>

  <!-- 输入区 -->
  <div class="composer">
    <div class="composer-inner">
      <div class="composer-box">
        <textarea
          id="input" rows="1"
          placeholder="有什么想问的？"
          disabled
          aria-label="输入问题"
          oninput="autoGrow(this)"
          onkeydown="onKey(event)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()" disabled aria-label="发送消息">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="hint">Enter 发送 · Shift+Enter 换行</div>
    </div>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ═══════════════════════
   常量 & 状态
═══════════════════════ */
const LS_KEY = "codeqa.sessions";

// SVG 图标映射
const SCN_ICONS = {
  code: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  tool: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
  log:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  db:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
  folder:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
};

// 用户 & AI 头像 SVG
const USER_AV = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
const BOT_AV  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`;

function scnIcon(name, desc) {
  const s = (name + " " + (desc || "")).toLowerCase();
  if (/qa|code|问答|代码/.test(s))              return SCN_ICONS.code;
  if (/trouble|shoot|排查|问题|bug|fix/.test(s)) return SCN_ICONS.tool;
  if (/log|日志/.test(s))                       return SCN_ICONS.log;
  if (/db|sql|数据/.test(s))                    return SCN_ICONS.db;
  return SCN_ICONS.folder;
}

let SCENARIOS   = [];
let DEFAULT_SCN = null;
let current     = null;   // { id, scenario }
let busy        = false;

/* ═══════════════════════
   启动
═══════════════════════ */
init();
async function init() {
  renderHist();
  try {
    const r = await fetch("/scenarios");
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    SCENARIOS   = data.scenarios || [];
    DEFAULT_SCN = data.default_scenario || (SCENARIOS[0] && SCENARIOS[0].name);
  } catch (e) {
    toast("场景加载失败：" + e.message);
  }
  restoreFromHash();
}

/* ═══════════════════════
   路由：让刷新 / 直达保持当前视图
   #s/<场景>  仅选了场景、尚未产生会话
   #c/<会话id> 已有会话
═══════════════════════ */
function setRoute(hash) {
  // replaceState 更新地址栏但不新增历史、不触发事件，避免重入
  history.replaceState(null, "", hash ? "#" + hash : location.pathname + location.search);
}

function restoreFromHash() {
  const h = location.hash.replace(/^#\/?/, "");
  if (h.startsWith("c/")) {
    const id = h.slice(2);
    if (loadSessions().some(x => x.id === id)) { openSession(id); return; }
  } else if (h.startsWith("s/")) {
    const name = decodeURIComponent(h.slice(2));
    if (SCENARIOS.some(s => s.name === name)) { pickScenario(name); return; }
  }
  newChat();
}

/* ═══════════════════════
   localStorage 历史
═══════════════════════ */
function loadSessions() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; }
}
function saveSessions(list) { localStorage.setItem(LS_KEY, JSON.stringify(list)); }

function upsertSession(s) {
  const list = loadSessions().filter(x => x.id !== s.id);
  list.unshift(s);
  saveSessions(list);
  renderHist();
}
function touchSession(id) {
  const list = loadSessions();
  const s = list.find(x => x.id === id);
  if (s) { s.updatedAt = new Date().toISOString(); saveSessions([s, ...list.filter(x => x.id !== id)]); renderHist(); }
}
function removeSession(id) {
  saveSessions(loadSessions().filter(x => x.id !== id));
  if (current && current.id === id) newChat();
  renderHist();
}

function renderHist() {
  const el   = document.getElementById("histList");
  const list = loadSessions();
  el.innerHTML = "";
  if (!list.length) {
    el.innerHTML = `<div class="hist-empty">暂无历史记录<br/>新建一个对话开始吧</div>`;
    return;
  }
  list.forEach(s => {
    const item = document.createElement("div");
    item.className = "hist-item" + (current && current.id === s.id ? " active" : "");
    item.setAttribute("role", "listitem");
    item.setAttribute("tabindex", "0");
    item.setAttribute("aria-label", s.title || "未命名会话");
    item.onclick = () => openSession(s.id);
    item.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openSession(s.id); } };
    item.innerHTML = `
      <div class="hi-title">${escHtml(s.title || "未命名会话")}</div>
      <div class="hi-meta">
        <span class="hi-badge">${escHtml(s.scenario || "")}</span>
        <span class="hi-time">${relTime(s.updatedAt)}</span>
      </div>
      <button class="hi-del" title="删除" aria-label="删除此会话">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>`;
    item.querySelector(".hi-del").onclick = e => { e.stopPropagation(); removeSession(s.id); };
    el.appendChild(item);
  });
}

/* ═══════════════════════
   会话视图
═══════════════════════ */
function newChat() {
  current = { id: null, scenario: null };
  setRoute("");
  document.getElementById("topScn").style.display  = "none";
  document.getElementById("topEmpty").style.display = "";
  setEnabled(false);
  renderHist();
  renderScenarioPicker();
}

function renderScenarioPicker() {
  const feed = document.getElementById("feed");
  if (!SCENARIOS.length) {
    feed.innerHTML = `
      <div class="welcome">
        <div class="welcome-ico" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h2>暂无可用场景</h2>
        <p>请检查后端 config.json 中的 scenarios 配置。</p>
      </div>`;
    return;
  }
  feed.innerHTML = `
    <div class="welcome">
      <div class="welcome-ico" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </div>
      <h2>代码问答助手</h2>
      <p>选择一个场景，我来帮你读代码、查问题。</p>
      <div class="scn-grid">
        ${SCENARIOS.map(s => `
          <div class="scn-card" data-name="${escHtml(s.name)}" tabindex="0" role="button" aria-label="选择场景：${escHtml(s.name)}">
            <div class="scn-icon" aria-hidden="true">${scnIcon(s.name, s.description)}</div>
            <div class="scn-name">${escHtml(s.name)}</div>
            <div class="scn-desc">${escHtml(s.description || "")}</div>
<!--            ${s.cwd ? `<div class="scn-cwd">${escHtml(s.cwd)}</div>` : ""}-->
          </div>`).join("")}
      </div>
    </div>`;
  feed.querySelectorAll(".scn-card").forEach(el => {
    el.onclick   = () => pickScenario(el.dataset.name);
    el.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pickScenario(el.dataset.name); } };
  });
}

function pickScenario(name) {
  current = { id: null, scenario: name };
  setRoute("s/" + encodeURIComponent(name));
  showBadge(name);
  document.getElementById("feed").innerHTML = "";
  // 选中场景后,先以一条 AI 气泡显示该场景的引导语(介绍用途+用法)。
  // 仅前端渲染,不发往后端、不入库,故重开历史会话时不会重复出现。
  const scn = SCENARIOS.find(s => s.name === name);
  if (scn && scn.guide) addBubble("bot", scn.guide, true);
  setEnabled(true);
  document.getElementById("input").focus();
}

function showBadge(name) {
  document.getElementById("topEmpty").style.display = "none";
  document.getElementById("topScn").style.display   = "";
  document.getElementById("topBadge").textContent   = name;
}

async function openSession(id) {
  if (busy) { toast("请等当前回答完成再切换会话"); return; }
  setEnabled(false);
  try {
    const r = await fetch(`/conversations/${id}/messages`);
    if (r.status === 404) { toast("该会话在后端已不存在，已从列表移除"); removeSession(id); return; }
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    const scn  = (data.conversation && data.conversation.scenario) || DEFAULT_SCN;
    current = { id, scenario: scn };
    setRoute("c/" + id);
    showBadge(scn);
    renderHist();
    const feed = document.getElementById("feed");
    feed.innerHTML = "";
    (data.messages || []).forEach(m => addBubble(m.role === "user" ? "user" : "bot", m.content, true));
    setEnabled(true);
    scrollBottom();
  } catch (e) {
    toast("加载会话失败：" + e.message);
    setEnabled(true);
  }
}

/* ═══════════════════════
   发送 & SSE 流
═══════════════════════ */
async function send() {
  const input = document.getElementById("input");
  const q = input.value.trim();
  if (!q || busy || !current.scenario) return;

  addBubble("user", q, false);
  input.value = ""; autoGrow(input);
  busy = true; setEnabled(false);

  const thinkEl = addThinking();
  let secs = 0;
  const timer = setInterval(() => {
    secs++;
    const el = thinkEl.querySelector(".thinking-secs");
    if (el) el.textContent = secs + "s";
  }, 1000);

  let bubble = null, contentEl = null, answer = "", started = false;

  const startBubble = () => {
    clearInterval(timer);
    thinkEl.remove();
    const b = addBubble("bot", "", false);
    bubble = b.bubble; contentEl = b.contentEl;
    started = true;
  };

  try {
    const resp = await fetch("/ask_stream", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, scenario: current.scenario, conversation_id: current.id }),
    });

    if (!resp.ok) {
      clearInterval(timer); thinkEl.remove();
      let msg = "HTTP " + resp.status;
      try { const j = await resp.json(); if (j.error) msg = j.error; } catch {}
      showError(msg); return;
    }

    await parseSSE(resp, (event, data) => {
      if (event === "token") {
        if (!started) startBubble();
        answer += (data.text || "");
        renderMd(contentEl, answer, false);
        scrollBottom();
      } else if (event === "done") {
        if (!started) startBubble();
        answer = data.answer || answer;
        renderMd(contentEl, answer, true);
        const meta = document.createElement("div");
        meta.className = "msg-meta";
        meta.innerHTML = `<span>${data.num_turns ?? 0} 轮对话</span><span class="meta-dot"></span><span>$${(data.cost_usd ?? 0).toFixed(4)}</span>`;
        bubble.appendChild(meta);
        onAnswered(data.conversation_id, q);
      } else if (event === "error") {
        clearInterval(timer);
        if (!started) thinkEl.remove();
        showError(data.error || "未知错误");
      }
    });
  } catch (e) {
    clearInterval(timer); thinkEl.remove();
    showError("网络错误：" + e.message);
  } finally {
    clearInterval(timer);
    busy = false; setEnabled(true);
    document.getElementById("input").focus();
    scrollBottom();
  }
}

async function parseSSE(resp, onEvent) {
  const reader  = resp.body.getReader();
  const decoder = new TextDecoder("utf-8");
  let buf = "";
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf("\n\n")) !== -1) {
      const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
      let ev = "message", dataStr = "";
      chunk.split("\n").forEach(line => {
        if (line.startsWith("event:"))      ev      = line.slice(6).trim();
        else if (line.startsWith("data:"))  dataStr += line.slice(5).trim();
      });
      if (!dataStr) continue;
      let d; try { d = JSON.parse(dataStr); } catch { d = { text: dataStr }; }
      onEvent(ev, d);
    }
  }
}

function onAnswered(convId, question) {
  if (!convId) return;
  if (!current.id) {
    current.id = convId;
    setRoute("c/" + convId);
    const now = new Date().toISOString();
    upsertSession({ id: convId, scenario: current.scenario, title: question.slice(0, 22), createdAt: now, updatedAt: now });
  } else {
    touchSession(current.id);
  }
}

/* ═══════════════════════
   DOM 辅助
═══════════════════════ */
function addBubble(role, text, withMd) {
  const feed = document.getElementById("feed");
  const msg  = document.createElement("div");
  msg.className = "msg " + (role === "user" ? "user" : "bot");
  msg.innerHTML = `<div class="av" aria-hidden="true">${role === "user" ? USER_AV : BOT_AV}</div><div class="bubble"><div class="content"></div></div>`;
  const contentEl = msg.querySelector(".content");
  if (role === "user")    contentEl.textContent = text;
  else if (withMd)        renderMd(contentEl, text, true);
  feed.appendChild(msg);
  scrollBottom();
  return { bubble: msg.querySelector(".bubble"), contentEl };
}

function addThinking() {
  const feed = document.getElementById("feed");
  const msg  = document.createElement("div");
  msg.className = "msg bot";
  msg.setAttribute("aria-live", "polite");
  msg.innerHTML = `
    <div class="av" aria-hidden="true">${BOT_AV}</div>
    <div class="bubble thinking-bubble">
      <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
      <span class="thinking-text">正在思考</span>
      <span class="thinking-secs">0s</span>
    </div>`;
  feed.appendChild(msg); scrollBottom();
  return msg;
}

function showError(msg) {
  const { bubble } = addBubble("bot", "", false);
  bubble.parentElement.classList.add("err");
  bubble.querySelector(".content").innerHTML =
    `出了点状况，请稍后再试。<div class="msg-meta">${escHtml(msg)}</div>`;
  scrollBottom();
}

const COPY_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_ICON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function addCopyButtons(el) {
  el.querySelectorAll("pre").forEach(pre => {
    if (pre.querySelector(".copy-btn")) return;
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.setAttribute("aria-label", "复制代码");
    btn.innerHTML = COPY_ICON;
    btn.addEventListener("click", () => {
      const code = pre.querySelector("code");
      const text = code ? code.innerText : pre.innerText;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add("copied");
        btn.innerHTML = CHECK_ICON;
        setTimeout(() => { btn.classList.remove("copied"); btn.innerHTML = COPY_ICON; }, 2000);
      }).catch(() => {
        const range = document.createRange();
        range.selectNodeContents(code || pre);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
      });
    });
    pre.appendChild(btn);
  });
}

function renderMd(el, text, hl) {
  if (window.marked) {
    el.innerHTML = marked.parse(text);
    if (hl && window.hljs) el.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b));
    if (hl) addCopyButtons(el);
  } else {
    el.textContent = text;
  }
}

function setEnabled(on) {
  const inp = document.getElementById("input");
  const btn = document.getElementById("sendBtn");
  inp.disabled = !on;
  btn.disabled = !on;
  inp.setAttribute("aria-disabled", String(!on));
}

function scrollBottom() { const f = document.getElementById("feed"); f.scrollTop = f.scrollHeight; }
function autoGrow(t)    { t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 140) + "px"; }
function onKey(e)       { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }
function escHtml(s)     { const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
}

function relTime(iso) {
  if (!iso) return "";
  const d = new Date(iso), now = new Date(), diff = (now - d) / 1000;
  if (diff < 60)    return "刚刚";
  if (diff < 3600)  return Math.floor(diff / 60) + " 分钟前";
  if (diff < 86400 && d.getDate() === now.getDate()) return d.toTimeString().slice(0, 5);
  if (diff < 172800) return "昨天";
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
